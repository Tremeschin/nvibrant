name: release
on:
  workflow_dispatch:
    inputs:
      publish:
        required: true
        type: boolean

jobs:
  main:
    name: Release
    runs-on: ubuntu-22.04
    environment: release
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Get version
        run: echo "VERSION=$(uv version --short)" >> $GITHUB_ENV

      - run: echo "Version is $VERSION"

      - name: Make wheel
        run: uv build --wheel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Publish to PyPI
        if: ${{ inputs.publish }}
        run: uv publish

      - name: Create release
        if: ${{ inputs.publish }}
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ env.VERSION }}
          tag_name: v${{ env.VERSION }}
          files: dist/*
